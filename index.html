<!DOCTYPE html>
<html>
<head>
    <title>Caesar Cipher</title>
    <style>
        body {
            font-family: Arial;
            background: #eef3ff;
            padding: 40px;
        }

        .box {
            background: white;
            max-width: 500px;
            margin: auto;
            padding: 25px;
            border-radius: 12px;
        }

        textarea, input, button {
            width: 100%;
            margin-top: 10px;
            padding: 10px;
            font-size: 16px;
        }

        button {
            background: #2563eb;
            color: white;
            border: none;
            cursor: pointer;
        }

        #result {
            margin-top: 15px;
            padding: 10px;
            background: #f1f5f9;
        }
    </style>
</head>

<body>
    <div class="box">
        <h2>Caesar Cipher Encryption</h2>

        <textarea id="text" placeholder="Enter text"></textarea>

        <input type="number" id="shift" placeholder="Enter shift value">

        <button onclick="encrypt()">Encrypt</button>

        <div id="result">Result will appear here</div>
    </div>

    <script>
        function encrypt() {
            let text = document.getElementById("text").value;
            let shift = Number(document.getElementById("shift").value);
            let result = "";

            for (let i = 0; i < text.length; i++) {
                let ch = text[i];

                if (ch >= 'A' && ch <= 'Z') {
                    result += String.fromCharCode((ch.charCodeAt(0) - 65 + shift) % 26 + 65);
                }
                else if (ch >= 'a' && ch <= 'z') {
                    result += String.fromCharCode((ch.charCodeAt(0) - 97 + shift) % 26 + 97);
                }
                else {
                    result += ch;
                }
            }

            document.getElementById("result").innerText = result;
        }
    </script>
</body>
</html>
